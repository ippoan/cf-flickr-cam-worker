name: CI

# ippoan/cf-flickr-proxy / security-notification-app と同じ frontend-ci.yml
# caller pattern。single-env 運用 (staging = prod) — PR merge / tag push
# どちらも root wrangler.jsonc の `wrangler deploy` を走らせる。
#
# 初回 deploy 前に KV namespace / Secrets Store の one-time setup が必要
# (README「One-time setup」参照)。未完了のまま deploy が走ると
# `kv_namespaces` / `secrets_store_secrets` の placeholder id で fail する。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'worker'
      # @ippoan/mcp-cf-workers は GitHub Packages (private read)。setup-node に
      # @ippoan scope registry + NODE_AUTH_TOKEN=GITHUB_TOKEN を構成させる。
      npm_scope: '@ippoan'
      install_command: 'npm install'
      typecheck_command: 'npx tsc --noEmit'
      has_tests: true
      test_command: 'npx vitest run --coverage'
      # single-env: staging deploy と release deploy は同じ root config を叩く。
      # wrangler deploy は D1 migration を自動適用しないため、deploy 前に remote
      # migration apply を挟む (CLOUDFLARE_API_TOKEN は D1:Edit を保有、Refs #12)。
      deploy_staging_script: 'npx wrangler d1 migrations apply cf-flickr-cam-worker-db --remote && npx wrangler deploy'
      deploy_release_script: 'npx wrangler d1 migrations apply cf-flickr-cam-worker-db --remote && npx wrangler deploy'
    secrets: inherit
